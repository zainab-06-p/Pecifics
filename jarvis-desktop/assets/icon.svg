<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2cbf"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="url(#glow)" stroke-width="4"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Center eye/core -->
  <circle cx="256" cy="256" r="80" fill="#12121a" stroke="#00d4ff" stroke-width="3"/>
  <circle cx="256" cy="256" r="50" fill="url(#glow)" opacity="0.8"/>
  <circle cx="256" cy="256" r="25" fill="#00d4ff"/>
  <circle cx="246" cy="246" r="8" fill="#ffffff" opacity="0.8"/>
  
  <!-- Tech lines -->
  <path d="M 256 176 L 256 76" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <path d="M 256 336 L 256 436" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <path d="M 176 256 L 76 256" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <path d="M 336 256 L 436 256" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  
  <!-- Corner brackets -->
  <path d="M 120 120 L 120 160 M 120 120 L 160 120" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 392 120 L 392 160 M 392 120 L 352 120" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 120 392 L 120 352 M 120 392 L 160 392" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M 392 392 L 392 352 M 392 392 L 352 392" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.7"/>
  
  <!-- Dots -->
  <circle cx="256" cy="76" r="6" fill="#00d4ff"/>
  <circle cx="256" cy="436" r="6" fill="#00d4ff"/>
  <circle cx="76" cy="256" r="6" fill="#00d4ff"/>
  <circle cx="436" cy="256" r="6" fill="#00d4ff"/>
</svg>
